<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Primebahis Contact</title>

<style>
:root{
    --bg:#060b16;
    --card:#111827;
    --gold:#f6c64b;
    --gold2:#d89b00;
    --text:#ffffff;
    --muted:#b5bfd2;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:
    linear-gradient(180deg,#050913 0%,#0d1527 50%,#050913 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Arkaplan */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#f6c64b25 0%,transparent 30%),
    radial-gradient(circle at bottom,#d89b0015 0%,transparent 40%),
    radial-gradient(circle at center,#142340 0%,transparent 65%);
    animation:bgMove 15s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes bgMove{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.12);
    }
}

.container{
    width:90%;
    max-width:430px;
    background:rgba(17,24,39,.96);
    border:1px solid rgba(246,198,75,.25);
    border-radius:28px;
    padding:50px 30px;
    text-align:center;
    backdrop-filter:blur(12px);

    box-shadow:
    0 0 35px rgba(246,198,75,.08),
    0 20px 60px rgba(0,0,0,.65);
}

h1{
    font-size:48px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:18px;

    background:linear-gradient(
        180deg,
        #fff9d6 0%,
        #f6c64b 50%,
        #d89b00 100%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 20px rgba(246,198,75,.3);
}

p{
    color:var(--muted);
    margin-bottom:18px;
    font-size:15px;
    line-height:1.6;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-top:30px;
}

.button{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-decoration:none;
    height:60px;
    border-radius:16px;
    font-size:17px;
    font-weight:700;
    transition:.3s;
    border:1px solid rgba(246,198,75,.25);
}

.button img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* Premium altın butonlar */
.whatsapp,
.telegram,
.site{
    background:linear-gradient(
        180deg,
        #ffe28a 0%,
        #f6c64b 50%,
        #d89b00 100%
    );

    color:#111;

    box-shadow:
    0 8px 25px rgba(216,155,0,.35);
}

.whatsapp:hover,
.telegram:hover,
.site:hover{
    transform:translateY(-5px);

    box-shadow:
    0 15px 35px rgba(216,155,0,.55);
}

footer{
    margin-top:35px;
    color:#7f8ba1;
    font-size:13px;
    letter-spacing:1px;
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="container">
    <h1>Primebahis</h1>
    <p>Nisan PreVIP Müşteri Temsilcisi</p>
    <p>Güncel iletişim ve Site Bağlantıları</p>

    <div class="buttons">
        <a class="button whatsapp" href="https://wa.me/995555392461" target="_blank">
    <img src="whatsapp.png" alt="WhatsApp">
    WhatsApp İletişim
</a>

        <a class="button telegram" href="https://t.me/previpnisan" target="_blank">
    <img src="telegram.webp" alt="Telegram">
    Telegram İletişim
</a>

        <a class="button site" href="https://primebahis391.com" target="_blank">
    <img src="world.png" alt="Website">
    Güncel Site
</a>
    </div>

    <footer>
        © Primebahis - Tüm hakları saklıdır
    </footer>
</div>

</body>
</html>
