<!DOCTYPE html>

<style>
:root{
    --bg:#08111f;
    --card:#121d30;
    --gold:#ffbf33;
    --gold2:#ff9800;
    --text:#ffffff;
    --muted:#bfc7d5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(180deg,#08111f,#101b30,#08111f);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Arkaplan */
.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#ffb30033 0%,transparent 35%),
    radial-gradient(circle at bottom,#ff8a0030 0%,transparent 30%),
    radial-gradient(circle at center,#1b2f55 0%,transparent 60%);
    animation:bgMove 12s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes bgMove{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.15);
    }
}

.container{
    width:90%;
    max-width:420px;
    background:rgba(18,29,48,.95);
    border:2px solid rgba(255,191,51,.3);
    border-radius:24px;
    padding:45px 30px;
    text-align:center;
    box-shadow:
    0 0 25px rgba(255,191,51,.15),
    0 15px 40px rgba(0,0,0,.45);
}

h1{
    font-size:42px;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:12px;
    color:var(--gold);
    text-shadow:
        0 0 10px rgba(255,191,51,.6),
        0 0 25px rgba(255,152,0,.3);
}

p{
    color:var(--muted);
    margin-bottom:35px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.button{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    height:58px;
    border-radius:14px;
    font-size:17px;
    font-weight:bold;
    color:#fff;
    transition:.3s;
    border:1px solid rgba(255,191,51,.3);
}

/* Altın buton */
.whatsapp,
.telegram,
.site{
    background:linear-gradient(180deg,#ffc83d,#ff9800);
    color:#1d1d1d;
    box-shadow:0 6px 20px rgba(255,166,0,.35);
}

.whatsapp:hover,
.telegram:hover,
.site:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 30px rgba(255,166,0,.6);
}

footer{
    margin-top:35px;
    color:#8d99ac;
    font-size:13px;
}

    .button{

    border:1px solid rgba(255,191,51,.3);
}

.button img{
    width:24px;
    height:24px;
    object-fit:contain;
}
    
</style>

</head>

</a>

        <a class="button telegram" href="https://t.me/previpnisan" target="_blank">
    <img src="telegram.webp" alt="Telegram">
